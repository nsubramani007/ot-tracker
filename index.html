<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Contest & OT Tracker</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; }
      input, select, textarea, button { font-family: inherit; font-size: 14px; }
      input, select, textarea {
        border: 1px solid #d3d1c7; border-radius: 8px; padding: 8px 10px;
        background: #fff; color: #1a1a18; outline: none; transition: border-color 0.15s;
      }
      input:focus, select:focus, textarea:focus { border-color: #1D9E75; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
